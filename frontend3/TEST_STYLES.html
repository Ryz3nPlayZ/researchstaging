<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Test</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#4a8fe3',
                        background: {
                            light: '#f6f7f8',
                            dark: '#121820'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light text-slate-900 font-sans p-8">
    <h1 class="text-2xl font-bold text-primary mb-4">Tailwind & Material Symbols Test</h1>

    <div class="space-y-4">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary">dashboard</span>
            <span>Outlined icon (primary color)</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="material-symbols-filled text-primary">auto_awesome</span>
            <span>Filled icon (primary color)</span>
        </div>
        <div class="bg-white p-4 rounded-lg shadow">White card</div>
        <div class="bg-primary text-white p-4 rounded-lg">Primary color card</div>
    </div>

    <script>
        // Test dark mode toggle
        document.body.classList.toggle('dark');
        setTimeout(() => {
            console.log('Dark mode test: Background should be dark');
            document.body.classList.toggle('dark');
        }, 2000);
    </script>
</body>
</html>
